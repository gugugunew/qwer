workflows:
  build-ios:
    name: Build iOS
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      # 1. 进入 aa 目录（你的项目根目录）
      - cd aa
      # 2. 拉取依赖（核心步骤，之前就是这里目录不对报错）
      - flutter pub get
      # 3. 编译 iOS 项目，不签名
      - flutter build ios --release --no-codesign
      # 4. 在 aa 目录内生成 exportOptions.plist（避免路径混乱）
      - name: Create exportOptions.plist
        script: |
          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingAllowed</key>
              <false/>
          </dict>
          </plist>
          EOF
      # 5. 导出 IPA（路径完全适配 aa 目录内的编译产物）
      - xcodebuild -exportArchive -archivePath build/ios/archive/Runner.xcarchive -exportOptionsPlist exportOptions.plist -exportPath build/ios/ipa
    artifacts:
      # 6. 从 aa 目录内的产物路径下载 IPA
      - aa/build/ios/ipa/*.ipa
