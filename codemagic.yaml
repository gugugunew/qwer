workflows:
  build-ios:
    name: Build iOS
    instance_type: mac_mini_m2
    environment:
      flutter: stable
    scripts:
      - cd aa
      - flutter pub get
      - flutter build ios --release --no-codesign
      - name: Create exportOptions.plist
        script: |
          cat > exportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>signingAllowed</key>
              <false/>
          </dict>
          </plist>
          EOF
      - xcodebuild -exportArchive -archivePath aa/build/ios/archive/Runner.xcarchive -exportOptionsPlist exportOptions.plist -exportPath aa/build/ios/ipa
    artifacts:
      - aa/build/ios/ipa/*.ipa
